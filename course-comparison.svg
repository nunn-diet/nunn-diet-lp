<svg viewBox="0 0 1000 820" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" role="img" aria-label="コース比較表">
  <!-- 背景 -->
  <rect width="1000" height="820" fill="#fdfaf5" rx="16"/>

  <!-- タイトル -->
  <text x="500" y="52" text-anchor="middle" font-size="22" font-weight="700" fill="#2d2d2d" letter-spacing="2">コース内容比較</text>

  <!-- 列ヘッダー背景 -->
  <rect x="30" y="68" width="450" height="90" rx="8" fill="#f5f0e8"/>
  <rect x="490" y="68" width="155" height="90" rx="8" fill="#f5ede8"/>
  <rect x="655" y="68" width="155" height="90" rx="8" fill="#eaf0f5"/>
  <rect x="820" y="68" width="155" height="90" rx="8" fill="#2d2d2d"/>

  <!-- コース名 -->
  <text x="255" y="100" text-anchor="middle" font-size="13" fill="#888" letter-spacing="1"></text>
  <text x="568" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#c25a2a">スターター</text>
  <text x="568" y="122" text-anchor="middle" font-size="18" font-weight="800" fill="#c25a2a">¥298,000</text>
  <text x="733" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#2d5fa0">レギュラー</text>
  <text x="733" y="122" text-anchor="middle" font-size="18" font-weight="800" fill="#2d5fa0">¥680,000</text>
  <text x="898" y="100" text-anchor="middle" font-size="16" font-weight="700" fill="#f5e6c8">プレミアム</text>
  <text x="898" y="122" text-anchor="middle" font-size="18" font-weight="800" fill="#f5e6c8">¥1,280,000</text>

  <!-- セクション1: 基本サポート -->
  <rect x="30" y="168" width="940" height="28" rx="4" fill="#e8e0d0"/>
  <text x="44" y="187" font-size="13" font-weight="700" fill="#5a4a3a" letter-spacing="1">基本サポート</text>

  <!-- 行データ -->
  <!-- チャット質問 -->
  <rect x="30" y="196" width="940" height="44" fill="#fdfaf5"/>
  <text x="44" y="223" font-size="14" fill="#2d2d2d">チャット質問</text>
  <text x="44" y="237" font-size="11" fill="#888">（LINEまたはDM）</text>
  <!-- スターター: 月10回 -->
  <text x="568" y="221" text-anchor="middle" font-size="22" fill="#3e9e75">◯</text>
  <text x="568" y="236" text-anchor="middle" font-size="10" fill="#888">月10回</text>
  <!-- レギュラー: 月30回 -->
  <text x="733" y="221" text-anchor="middle" font-size="22" fill="#3e9e75">◯</text>
  <text x="733" y="236" text-anchor="middle" font-size="10" fill="#888">月30回</text>
  <!-- プレミアム: 無制限 -->
  <text x="898" y="221" text-anchor="middle" font-size="24" fill="#d88a2a">◎</text>
  <text x="898" y="236" text-anchor="middle" font-size="10" fill="#d88a2a">無制限</text>

  <line x1="30" y1="240" x2="970" y2="240" stroke="#e8e0d0" stroke-width="1"/>

  <!-- マンツーマンセッション -->
  <rect x="30" y="240" width="940" height="44" fill="#f9f6f0"/>
  <text x="44" y="267" font-size="14" fill="#2d2d2d">マンツーマンセッション</text>
  <text x="44" y="281" font-size="11" fill="#888">（Zoom / 60分）</text>
  <text x="568" y="265" text-anchor="middle" font-size="22" fill="#3e9e75">◯</text>
  <text x="568" y="280" text-anchor="middle" font-size="10" fill="#888">月1回</text>
  <text x="733" y="265" text-anchor="middle" font-size="22" fill="#3e9e75">◯</text>
  <text x="733" y="280" text-anchor="middle" font-size="10" fill="#888">月2回</text>
  <text x="898" y="265" text-anchor="middle" font-size="24" fill="#d88a2a">◎</text>
  <text x="898" y="280" text-anchor="middle" font-size="10" fill="#d88a2a">無制限</text>

  <line x1="30" y1="284" x2="970" y2="284" stroke="#e8e0d0" stroke-width="1"/>

  <!-- セクション2: 添削・フィードバック -->
  <rect x="30" y="284" width="940" height="28" rx="4" fill="#e8e0d0"/>
  <text x="44" y="303" font-size="13" font-weight="700" fill="#5a4a3a" letter-spacing="1">添削・フィードバック</text>

  <!-- リール添削 -->
  <rect x="30" y="312" width="940" height="44" fill="#fdfaf5"/>
  <text x="44" y="339" font-size="14" fill="#2d2d2d">リール添削</text>
  <text x="568" y="337" text-anchor="middle" font-size="22" fill="#c25a4a">✕</text>
  <text x="733" y="337" text-anchor="middle" font-size="22" fill="#3e9e75">◯</text>
  <text x="733" y="352" text-anchor="middle" font-size="10" fill="#888">月3本</text>
  <text x="898" y="337" text-anchor="middle" font-size="24" fill="#d88a2a">◎</text>
  <text x="898" y="352" text-anchor="middle" font-size="10" fill="#d88a2a">無制限</text>

  <line x1="30" y1="356" x2="970" y2="356" stroke="#e8e0d0" stroke-width="1"/>

  <!-- カウンセリング添削 -->
  <rect x="30" y="356" width="940" height="44" fill="#f9f6f0"/>
  <text x="44" y="383" font-size="14" fill="#2d2d2d">カウンセリング添削</text>
  <text x="568" y="381" text-anchor="middle" font-size="22" fill="#c25a4a">✕</text>
  <text x="733" y="381" text-anchor="middle" font-size="22" fill="#3e9e75">◯</text>
  <text x="733" y="396" text-anchor="middle" font-size="10" fill="#888">月3件</text>
  <text x="898" y="381" text-anchor="middle" font-size="24" fill="#d88a2a">◎</text>
  <text x="898" y="396" text-anchor="middle" font-size="10" fill="#d88a2a">無制限</text>

  <line x1="30" y1="400" x2="970" y2="400" stroke="#e8e0d0" stroke-width="1"/>

  <!-- セクション3: 教材・コンテンツ -->
  <rect x="30" y="400" width="940" height="28" rx="4" fill="#e8e0d0"/>
  <text x="44" y="419" font-size="13" font-weight="700" fill="#5a4a3a" letter-spacing="1">教材・コンテンツ</text>

  <!-- 動画教材 -->
  <rect x="30" y="428" width="940" height="44" fill="#fdfaf5"/>
  <text x="44" y="455" font-size="14" fill="#2d2d2d">動画教材</text>
  <text x="568" y="453" text-anchor="middle" font-size="22" fill="#3e9e75">◯</text>
  <text x="733" y="453" text-anchor="middle" font-size="22" fill="#3e9e75">◯</text>
  <text x="898" y="453" text-anchor="middle" font-size="22" fill="#3e9e75">◯</text>

  <line x1="30" y1="472" x2="970" y2="472" stroke="#e8e0d0" stroke-width="1"/>

  <!-- コミュニティ参加 -->
  <rect x="30" y="472" width="940" height="44" fill="#f9f6f0"/>
  <text x="44" y="499" font-size="14" fill="#2d2d2d">コミュニティ参加</text>
  <text x="568" y="497" text-anchor="middle" font-size="22" fill="#3e9e75">◯</text>
  <text x="733" y="497" text-anchor="middle" font-size="22" fill="#3e9e75">◯</text>
  <text x="898" y="497" text-anchor="middle" font-size="22" fill="#3e9e75">◯</text>

  <line x1="30" y1="516" x2="970" y2="516" stroke="#e8e0d0" stroke-width="1"/>

  <!-- 期間 -->
  <rect x="30" y="516" width="940" height="44" fill="#fdfaf5"/>
  <text x="44" y="543" font-size="14" fill="#2d2d2d">サポート期間</text>
  <text x="568" y="543" text-anchor="middle" font-size="13" fill="#2d2d2d">3ヶ月</text>
  <text x="733" y="543" text-anchor="middle" font-size="13" fill="#2d2d2d">6ヶ月</text>
  <text x="898" y="543" text-anchor="middle" font-size="13" fill="#2d2d2d">12ヶ月</text>

  <line x1="30" y1="560" x2="970" y2="560" stroke="#e8e0d0" stroke-width="1"/>

  <!-- セクション4: 全コース共通プレゼント資料 -->
  <rect x="30" y="560" width="940" height="28" rx="4" fill="#d4a843" fill-opacity="0.25"/>
  <text x="44" y="579" font-size="13" font-weight="700" fill="#7a5a10" letter-spacing="1">🎁 全コース共通プレゼント資料</text>

  <rect x="30" y="588" width="940" height="36" fill="#fdf8ee"/>
  <text x="44" y="611" font-size="13" fill="#2d2d2d">個別カウンセリング用スライド資料</text>
  <text x="568" y="611" text-anchor="middle" font-size="20" fill="#3e9e75">◯</text>
  <text x="733" y="611" text-anchor="middle" font-size="20" fill="#3e9e75">◯</text>
  <text x="898" y="611" text-anchor="middle" font-size="20" fill="#3e9e75">◯</text>
  <line x1="30" y1="624" x2="970" y2="624" stroke="#e8e0d0" stroke-width="1"/>

  <rect x="30" y="624" width="940" height="36" fill="#fdfaf5"/>
  <text x="44" y="647" font-size="13" fill="#2d2d2d">ファスティングマニュアル</text>
  <text x="568" y="647" text-anchor="middle" font-size="20" fill="#3e9e75">◯</text>
  <text x="733" y="647" text-anchor="middle" font-size="20" fill="#3e9e75">◯</text>
  <text x="898" y="647" text-anchor="middle" font-size="20" fill="#3e9e75">◯</text>
  <line x1="30" y1="660" x2="970" y2="660" stroke="#e8e0d0" stroke-width="1"/>

  <rect x="30" y="660" width="940" height="36" fill="#fdf8ee"/>
  <text x="44" y="683" font-size="13" fill="#2d2d2d">カウンセリングシート</text>
  <text x="568" y="683" text-anchor="middle" font-size="20" fill="#3e9e75">◯</text>
  <text x="733" y="683" text-anchor="middle" font-size="20" fill="#3e9e75">◯</text>
  <text x="898" y="683" text-anchor="middle" font-size="20" fill="#3e9e75">◯</text>
  <line x1="30" y1="696" x2="970" y2="696" stroke="#e8e0d0" stroke-width="1"/>

  <rect x="30" y="696" width="940" height="36" fill="#fdfaf5"/>
  <text x="44" y="719" font-size="13" fill="#2d2d2d">ファスティング後のアンケート様式</text>
  <text x="568" y="719" text-anchor="middle" font-size="20" fill="#3e9e75">◯</text>
  <text x="733" y="719" text-anchor="middle" font-size="20" fill="#3e9e75">◯</text>
  <text x="898" y="719" text-anchor="middle" font-size="20" fill="#3e9e75">◯</text>

  <!-- 枠線 -->
  <rect x="30" y="68" width="940" height="664" rx="8" fill="none" stroke="#d4c4a8" stroke-width="1.5"/>
  <!-- 縦線 -->
  <line x1="490" y1="68" x2="490" y2="732" stroke="#d4c4a8" stroke-width="1"/>
  <line x1="655" y1="68" x2="655" y2="732" stroke="#d4c4a8" stroke-width="1"/>
  <line x1="820" y1="68" x2="820" y2="732" stroke="#d4c4a8" stroke-width="1"/>

  <!-- 凡例 -->
  <text x="500" y="768" text-anchor="middle" font-size="13" fill="#888">
    <tspan font-size="16" fill="#d88a2a">◎</tspan><tspan> 無制限　</tspan>
    <tspan font-size="16" fill="#3e9e75">◯</tspan><tspan> 含む　</tspan>
    <tspan font-size="16" fill="#c25a4a">✕</tspan><tspan> 含まない</tspan>
  </text>
</svg>
